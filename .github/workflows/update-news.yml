name: Update Compliance Watch Items

on:
  # Run at 8:00 AM AEST (22:00 UTC) on the 1st of every month
  schedule:
    - cron: '0 22 1 * *'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit news.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate updated news.json via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/generate_news.py

      - name: Commit and push if news.json changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No changes to news.json — skipping commit."
          else
            git commit -m "chore: monthly compliance watch update ($(date '+%B %Y'))"
            git push
          fi
